name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install hook tools
        run: |
          go install github.com/evilmartians/lefthook@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run pre-commit hooks
        run: lefthook run pre-commit --all-files
      - name: Test
        run: go test ./...

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -o skiletto.exe .
      - name: End-to-end (junction fallback)
        shell: pwsh
        run: ./scripts/e2e-windows.ps1
