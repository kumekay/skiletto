name: Release

# Runs on version tags (e.g. v0.1.0). goreleaser builds the binaries and
# creates the GitHub release unconditionally. PyPI and npm both publish via
# trusted publishing (OIDC), so no secrets are needed; both publishers must
# be configured to trust this workflow file (pypi.org and npmjs.com package
# settings). npm provenance is generated automatically.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          include-hidden-files: true

  npm:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Trusted publishing needs npm >= 11.5.1; Node 24 bundles it.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Set package version from tag
        working-directory: packaging/npm
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
      - name: Test wrapper
        working-directory: packaging/npm
        run: node --test
      - name: Publish to npm
        working-directory: packaging/npm
        run: npm publish --access public

  pypi:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Build platform wheels
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            # goreleaser build dirs carry an arch-version suffix (e.g. amd64_v1, arm64_v8.0).
            bin=$(ls dist/skiletto_${os}_${arch}_*/skiletto${ext})
            python packaging/pypi/build_wheel.py \
              --version "$VERSION" --os "$os" --arch "$arch" \
              --binary "$bin" --outdir wheelhouse
          done
          ls -l wheelhouse
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse
